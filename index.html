<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분양상담 예약 — 유상옵션 상담</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
.header{background:#fff;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;border:1px solid #e8e8e8}
.header-title{font-size:17px;font-weight:600}
.header-sub{font-size:12px;color:#888;margin-top:3px}
.header-btns{display:flex;gap:6px}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;border:1px solid #e8e8e8}
.section-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.tab-bar{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:2px solid #eee}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;border:none;background:none;color:#888;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#1a7a5e;border-bottom-color:#1a7a5e}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.slot{padding:11px 8px;border:1.5px solid #e0e0e0;border-radius:10px;text-align:center;font-size:13px;cursor:pointer;transition:all 0.15s;background:#fff;user-select:none}
.slot:hover:not(.taken){border-color:#1a7a5e;background:#edf7f3;color:#1a7a5e}
.slot.taken{background:#f5f5f5;color:#bbb;cursor:not-allowed;border-color:#eee}
.slot.taken .slot-status{font-size:11px;color:#bbb;margin-top:2px}
.slot .slot-time{font-weight:500}
.slot-info-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:13px;color:#666}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.badge.avail{background:#edf7f3;color:#1a7a5e}
.badge.taken{background:#f0f0f0;color:#999}
label{font-size:13px;color:#555;display:block;margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input[type=text],input[type=tel],input[type=password]{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;transition:border 0.15s;outline:none}
input:focus{border-color:#1a7a5e}
.btn{display:inline-block;padding:10px 18px;border-radius:8px;border:1.5px solid #ccc;background:#fff;color:#333;font-size:13px;cursor:pointer;transition:all 0.15s;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#1a7a5e;border-color:#1a7a5e;color:#fff}
.btn.primary:hover{background:#155f49}
.btn.danger{background:#e84040;border-color:#e84040;color:#fff}
.btn.danger:hover{background:#c43030}
.btn.sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;line-height:1.5}
.alert.success{background:#edf7f3;color:#1a7a5e;border:1px solid #a8dbc8}
.alert.error{background:#fdf0f0;color:#c43030;border:1px solid #f5b8b8}
.alert.info{background:#eef4fd;color:#1a5fa0;border:1px solid #b0cef5}
.done-wrap{text-align:center;padding:2rem 1rem}
.done-icon{width:56px;height:56px;border-radius:50%;background:#edf7f3;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;border-bottom:1.5px solid #eee;color:#888;font-weight:500}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:#f9f9f9;border-radius:10px;padding:1rem;text-align:center;border:1px solid #eee}
.stat-num{font-size:26px;font-weight:700;color:#1a7a5e}
.stat-label{font-size:12px;color:#888;margin-top:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:0.75rem}
.modal-desc{font-size:13px;color:#555;line-height:1.6;margin-bottom:1.25rem}
.hidden{display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;z-index:300}
.lookup-booking-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.lookup-booking-item:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <div class="header-title">분양상담 예약</div>
      <div class="header-sub">유상옵션 상담 · 4/24(목) ~ 4/25(금)</div>
    </div>
    <div class="header-btns">
      <button class="btn sm" onclick="showPage('lookup')">예약 조회</button>
      <button class="btn sm" onclick="showPage('admin-login')">관리자</button>
    </div>
  </div>

  <!-- 홈 -->
  <div id="page-home" class="page active">
    <div class="card">
      <div class="tab-bar">
        <button class="tab active" onclick="switchDay(0,this)">4월 24일 (목)</button>
        <button class="tab" onclick="switchDay(1,this)">4월 25일 (금)</button>
      </div>
      <div class="slot-info-bar">
        <span id="slot-count-text" style="font-size:13px;color:#666"></span>
        <div style="display:flex;gap:6px">
          <span class="badge avail">● 예약 가능</span>
          <span class="badge taken">● 예약 완료</span>
        </div>
      </div>
      <div id="slot-area"></div>
    </div>
  </div>

  <!-- 예약 입력 -->
  <div id="page-booking" class="page">
    <div class="card">
      <div class="section-title">예약 정보 입력</div>
      <div id="booking-slot-info" style="font-size:14px;color:#1a7a5e;font-weight:600;margin-bottom:1rem;padding:10px 14px;background:#edf7f3;border-radius:8px"></div>
      <label>이름</label>
      <input id="inp-name" type="text" placeholder="홍길동">
      <label>연락처</label>
      <input id="inp-phone" type="tel" placeholder="010-0000-0000">
      <div id="booking-alert"></div>
      <div class="btn-row">
        <button class="btn" onclick="showPage('home')">취소</button>
        <button class="btn primary" id="btn-submit" onclick="submitBooking()">예약하기</button>
      </div>
    </div>
  </div>

  <!-- 예약 완료 -->
  <div id="page-booking-done" class="page">
    <div class="card">
      <div class="done-wrap">
        <div class="done-icon">✓</div>
        <div style="font-size:17px;font-weight:600;margin-bottom:0.5rem">예약이 완료되었습니다</div>
        <div id="done-info" style="font-size:14px;color:#555;margin-bottom:0.5rem"></div>
        <div style="font-size:12px;color:#999;margin-bottom:1.5rem;line-height:1.6">예약 확인 및 취소는 상단 <strong>예약 조회</strong> 메뉴에서<br>이름과 연락처를 입력해주세요.</div>
        <button class="btn primary" onclick="showPage('home')">처음으로</button>
      </div>
    </div>
  </div>

  <!-- 예약 조회 -->
  <div id="page-lookup" class="page">
    <div class="card">
      <div class="section-title">예약 조회 / 취소</div>
      <p style="font-size:13px;color:#888;margin-bottom:1rem">예약 시 입력하신 이름과 연락처를 입력해주세요.</p>
      <label>이름</label>
      <input id="look-name" type="text" placeholder="홍길동">
      <label>연락처</label>
      <input id="look-phone" type="tel" placeholder="010-0000-0000">
      <div id="lookup-alert"></div>
      <button class="btn primary" style="width:100%;margin-top:1rem" onclick="doLookup()">조회하기</button>
    </div>
    <div id="lookup-result"></div>
    <button class="btn" onclick="showPage('home')" style="margin-top:4px">← 돌아가기</button>
  </div>

  <!-- 관리자 로그인 -->
  <div id="page-admin-login" class="page">
    <div class="card">
      <div class="section-title">관리자 로그인</div>
      <label>비밀번호</label>
      <input id="admin-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <div id="admin-login-alert"></div>
      <button class="btn primary" style="width:100%;margin-top:1rem" onclick="doAdminLogin()">로그인</button>
    </div>
    <button class="btn" onclick="showPage('home')" style="margin-top:4px">← 돌아가기</button>
  </div>

  <!-- 관리자 현황 -->
  <div id="page-admin" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div style="font-size:16px;font-weight:600">관리자 현황</div>
      <div style="display:flex;gap:6px">
        <button class="btn sm" onclick="exportCSV()">CSV 내보내기</button>
        <button class="btn sm danger" onclick="adminLogout()">로그아웃</button>
      </div>
    </div>
    <div id="admin-stats" class="stat-grid"></div>
    <div class="card">
      <div class="tab-bar">
        <button class="tab active" onclick="switchAdminDay(0,this)">4월 24일 (목)</button>
        <button class="tab" onclick="switchAdminDay(1,this)">4월 25일 (금)</button>
      </div>
      <div id="admin-table"></div>
    </div>
    <button class="btn" onclick="showPage('home')" style="margin-top:4px">← 돌아가기</button>
  </div>
</div>

<!-- 취소 확인 모달 (예약자) -->
<div id="modal-cancel" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">예약 취소</div>
    <div id="modal-cancel-info" class="modal-desc"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('cancel')">닫기</button>
      <button class="btn danger" onclick="confirmCancel()">취소 확인</button>
    </div>
  </div>
</div>

<!-- 취소 확인 모달 (관리자) -->
<div id="modal-admin-cancel" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">예약 취소 (관리자)</div>
    <div id="modal-admin-cancel-info" class="modal-desc"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('admin-cancel')">닫기</button>
      <button class="btn danger" onclick="confirmAdminCancel()">취소 확인</button>
    </div>
  </div>
</div>

<!-- 로딩 -->
<div id="loading" class="loading-overlay hidden">
  <div style="text-align:center">
    <div style="width:36px;height:36px;border:3px solid #ddd;border-top-color:#1a7a5e;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 8px"></div>
    <div style="font-size:13px;color:#888">처리 중...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://liqireuoeyqrkgcdfwlp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpcWlyZXVvZXlxcmtnY2Rmd2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjA3MzUsImV4cCI6MjA5MTc5NjczNX0.SFGk8r0O90n863WXiiNM1nB3j8Vk_WxnTPyZU4nWMV4';
const ADMIN_PW = 'admin1234';
const DAYS = ['2025-04-24','2025-04-25'];
const DAY_LABELS = ['4월 24일 (목)','4월 25일 (금)'];

function genSlots(day){
  const s=[];
  for(let h=10;h<17;h++){
    for(let m=0;m<60;m+=20){
      const sh=String(h).padStart(2,'0'),sm=String(m).padStart(2,'0');
      const em=String((m+20)%60).padStart(2,'0');
      const eh=m+20>=60?String(h+1).padStart(2,'0'):sh;
      s.push({key:`${day}_${sh}${sm}`,label:`${sh}:${sm}~${eh}:${em}`,day,time:`${sh}:${sm}`});
    }
  }
  return s;
}
const ALL_SLOTS={[DAYS[0]]:genSlots(DAYS[0]),[DAYS[1]]:genSlots(DAYS[1])};

let currentDay=0, adminDay=0;
let selectedSlot=null, pendingCancelId=null, adminCancelId=null;
let takenKeys=new Set();

async function api(method,path,body){
  const headers={
    'apikey':SUPABASE_ANON_KEY,
    'Authorization':'Bearer '+SUPABASE_ANON_KEY,
    'Content-Type':'application/json',
    'Accept':'application/json'
  };
  if(method==='POST')headers['Prefer']='return=representation';
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){
    let msg='오류';
    try{const e=await res.json();msg=e.message||e.error||JSON.stringify(e);}catch(ex){}
    throw new Error(msg);
  }
  if(res.status===204)return null;
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function fetchTaken(){
  const data=await api('GET','bookings?select=slot_key');
  takenKeys=new Set((data||[]).map(r=>r.slot_key));
}

function showLoading(v){document.getElementById('loading').classList.toggle('hidden',!v);}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='home')renderSlots();
  if(name==='admin')renderAdmin();
  if(name==='lookup'){
    document.getElementById('look-name').value='';
    document.getElementById('look-phone').value='';
    document.getElementById('lookup-alert').innerHTML='';
    document.getElementById('lookup-result').innerHTML='';
  }
}

function switchDay(idx,el){
  currentDay=idx;
  document.querySelectorAll('#page-home .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSlots();
}

async function renderSlots(){
  showLoading(true);
  try{
    await fetchTaken();
    const day=DAYS[currentDay];
    const slots=ALL_SLOTS[day];
    const takenCount=slots.filter(s=>takenKeys.has(s.key)).length;
    document.getElementById('slot-count-text').textContent='잔여 '+(slots.length-takenCount)+'/'+slots.length+' 슬롯';
    let html='<div class="slot-grid">';
    slots.forEach(function(s){
      const t=takenKeys.has(s.key);
      if(t){
        html+='<div class="slot taken"><div class="slot-time">'+s.label+'</div><div class="slot-status">예약완료</div></div>';
      }else{
        html+='<div class="slot" onclick="selectSlot(&quot;'+s.key+'&quot;,&quot;'+s.label+'&quot;,&quot;'+day+'&quot;)"><div class="slot-time">'+s.label+'</div></div>';
      }
    });
    html+='</div>';
    document.getElementById('slot-area').innerHTML=html;
  }catch(e){
    console.error('renderSlots error:',e);
    document.getElementById('slot-area').innerHTML='<p style="color:#c43030;font-size:13px;padding:1rem">오류: '+e.message+'</p>';
  }finally{
    showLoading(false);
  }
}

function selectSlot(key,label,day){
  selectedSlot={key,label,day};
  document.getElementById('booking-slot-info').textContent=`${DAY_LABELS[DAYS.indexOf(day)]}  ${label}`;
  document.getElementById('inp-name').value='';
  document.getElementById('inp-phone').value='';
  document.getElementById('booking-alert').innerHTML='';
  showPage('booking');
}

async function submitBooking(){
  const name=document.getElementById('inp-name').value.trim();
  const phone=document.getElementById('inp-phone').value.trim();
  if(!name||!phone){
    document.getElementById('booking-alert').innerHTML='<div class="alert error">이름과 연락처를 모두 입력해주세요.</div>';return;
  }
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>예약 중...';
  try{
    await api('POST','bookings',{slot_key:selectedSlot.key,day:selectedSlot.day,label:selectedSlot.label,name,phone});
    document.getElementById('done-info').textContent=`${DAY_LABELS[DAYS.indexOf(selectedSlot.day)]}  ${selectedSlot.label}  ·  ${name} 님`;
    showPage('booking-done');
  }catch(e){
    if(e.message.includes('unique')||e.message.includes('duplicate')){
      document.getElementById('booking-alert').innerHTML='<div class="alert error">이미 예약된 시간입니다. 다른 시간을 선택해주세요.</div>';
    } else {
      document.getElementById('booking-alert').innerHTML=`<div class="alert error">오류: ${e.message}</div>`;
    }
  }
  btn.disabled=false;btn.innerHTML='예약하기';
}

async function doLookup(){
  const name=document.getElementById('look-name').value.trim();
  const phone=document.getElementById('look-phone').value.trim();
  if(!name||!phone){
    document.getElementById('lookup-alert').innerHTML='<div class="alert error">이름과 연락처를 모두 입력해주세요.</div>';return;
  }
  showLoading(true);
  try{
    const data=await api('GET',`bookings?name=eq.${encodeURIComponent(name)}&phone=eq.${encodeURIComponent(phone)}&select=*`);
    document.getElementById('lookup-alert').innerHTML='';
    if(!data||data.length===0){
      document.getElementById('lookup-result').innerHTML='<div class="alert error" style="margin-top:8px">일치하는 예약 내역이 없습니다.</div>';
    } else {
      let html='<div class="card" style="margin-top:8px"><div class="section-title">예약 내역</div>';
      data.forEach(b=>{
        const dl=DAY_LABELS[DAYS.indexOf(b.day)]||b.day;
        html+=`<div class="lookup-booking-item">
          <div>
            <div style="font-size:14px;font-weight:600">${dl} ${b.label}</div>
            <div style="font-size:12px;color:#888;margin-top:2px">${b.name} · ${b.phone}</div>
          </div>
          <button class="btn sm danger" onclick="openCancelModal('${b.id}','${dl} ${b.label}')">취소</button>
        </div>`;
      });
      html+='</div>';
      document.getElementById('lookup-result').innerHTML=html;
    }
  }catch(e){
    document.getElementById('lookup-alert').innerHTML=`<div class="alert error">오류: ${e.message}</div>`;
  }
  showLoading(false);
}

function openCancelModal(id,info){
  pendingCancelId=id;
  document.getElementById('modal-cancel-info').textContent=`"${info}" 예약을 취소하시겠습니까?`;
  document.getElementById('modal-cancel').classList.remove('hidden');
}
function closeModal(type){
  document.getElementById('modal-'+type).classList.add('hidden');
}
async function confirmCancel(){
  showLoading(true);
  try{
    await api('DELETE',`bookings?id=eq.${pendingCancelId}`);
    closeModal('cancel');
    document.getElementById('lookup-result').innerHTML='';
    document.getElementById('look-name').value='';
    document.getElementById('look-phone').value='';
    document.getElementById('lookup-alert').innerHTML='<div class="alert success">예약이 취소되었습니다.</div>';
  }catch(e){alert('오류: '+e.message);}
  showLoading(false);
}

function doAdminLogin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw===ADMIN_PW){document.getElementById('admin-pw').value='';showPage('admin');}
  else{document.getElementById('admin-login-alert').innerHTML='<div class="alert error">비밀번호가 올바르지 않습니다.</div>';}
}
function adminLogout(){showPage('home');}
function switchAdminDay(idx,el){
  adminDay=idx;
  document.querySelectorAll('#page-admin .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderAdminTable();
}

let allBookings=[];
async function renderAdmin(){
  showLoading(true);
  try{
    allBookings=await api('GET','bookings?select=*&order=day.asc,slot_key.asc');
    const total=ALL_SLOTS[DAYS[0]].length+ALL_SLOTS[DAYS[1]].length;
    const taken=allBookings.length;
    document.getElementById('admin-stats').innerHTML=`
      <div class="stat-card"><div class="stat-num">${taken}</div><div class="stat-label">전체 예약</div></div>
      <div class="stat-card"><div class="stat-num">${total-taken}</div><div class="stat-label">잔여 슬롯</div></div>
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">전체 슬롯</div></div>`;
    renderAdminTable();
  }catch(e){alert('데이터 로드 오류: '+e.message);}
  showLoading(false);
}

function renderAdminTable(){
  const day=DAYS[adminDay];
  const slots=ALL_SLOTS[day];
  const map={};
  allBookings.forEach(b=>{if(b.day===day)map[b.slot_key]=b;});
  let html='<table><thead><tr><th>시간</th><th>이름</th><th>연락처</th><th>상태</th><th></th></tr></thead><tbody>';
  slots.forEach(s=>{
    const b=map[s.key];
    if(b){
      html+=`<tr><td>${s.label}</td><td>${b.name}</td><td>${b.phone}</td>
        <td><span class="badge taken">예약완료</span></td>
        <td><button class="btn sm danger" onclick="openAdminCancelModal('${b.id}','${s.label}','${b.name}')">취소</button></td></tr>`;
    } else {
      html+=`<tr><td>${s.label}</td><td style="color:#ccc">-</td><td style="color:#ccc">-</td>
        <td><span class="badge avail">가능</span></td><td></td></tr>`;
    }
  });
  html+='</tbody></table>';
  document.getElementById('admin-table').innerHTML=html;
}

function openAdminCancelModal(id,label,name){
  adminCancelId=id;
  document.getElementById('modal-admin-cancel-info').textContent=`"${label} · ${name}" 예약을 취소하시겠습니까?`;
  document.getElementById('modal-admin-cancel').classList.remove('hidden');
}
async function confirmAdminCancel(){
  showLoading(true);
  try{
    await api('DELETE',`bookings?id=eq.${adminCancelId}`);
    closeModal('admin-cancel');
    await renderAdmin();
  }catch(e){alert('오류: '+e.message);}
  showLoading(false);
}

function exportCSV(){
  let csv='\uFEFF날짜,시간,이름,연락처\n';
  DAYS.forEach((day,di)=>{
    ALL_SLOTS[day].forEach(s=>{
      const b=allBookings.find(x=>x.slot_key===s.key);
      if(b)csv+=`${DAY_LABELS[di]},${s.label},${b.name},${b.phone}\n`;
    });
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='예약현황.csv';a.click();
}

renderSlots();
</script>
