<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELIF세종 홈스타일링 상담 예약</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#F5F0E8;color:#2C2C2C;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:2rem 1rem}
.header{background:#fff;border-radius:14px;padding:1.5rem 1.75rem;margin-bottom:1.25rem;border:1px solid #E8E0D4;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{height:32px;width:auto}
.header-divider{width:1px;height:28px;background:#D5CCC0}
.header-text{}
.header-title{font-size:14px;font-weight:600;color:#1C4A35;letter-spacing:0.02em}
.header-sub{font-size:11px;color:#9A8E82;margin-top:3px;letter-spacing:0.01em}
.header-btns{display:flex;gap:6px}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border-radius:14px;padding:1.5rem 1.75rem;margin-bottom:1rem;border:1px solid #E8E0D4}
.section-title{font-size:15px;font-weight:600;color:#1C4A35;margin-bottom:1rem;letter-spacing:0.01em}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1.5px solid #E8E0D4}
.tab{padding:10px 22px;font-size:13px;cursor:pointer;border:none;background:none;color:#9A8E82;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1.5px;letter-spacing:0.02em}
.tab.active{color:#1C4A35;border-bottom-color:#1C4A35}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.slot{padding:12px 8px;border:1px solid #E0D8CE;border-radius:10px;text-align:center;font-size:12px;cursor:pointer;transition:all 0.15s;background:#FDFAF6;user-select:none;color:#4A4035}
.slot:hover:not(.taken){border-color:#1C4A35;background:#EBF2ED;color:#1C4A35}
.slot.taken{background:#F0EDE8;color:#C5BDB4;cursor:not-allowed;border-color:#E0D8CE}
.slot .slot-time{font-weight:600;font-size:13px}
.slot-status{font-size:10px;margin-top:3px;color:#C5BDB4}
.slot-info-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;font-size:12px;color:#9A8E82}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge.avail{background:#EBF2ED;color:#1C4A35}
.badge.taken{background:#F0EDE8;color:#9A8E82}
label{font-size:12px;color:#7A6E64;display:block;margin-bottom:4px;margin-top:14px;letter-spacing:0.02em}
label:first-child{margin-top:0}
input[type=text],input[type=tel],input[type=password]{width:100%;padding:10px 13px;border:1px solid #D8D0C4;border-radius:8px;font-size:14px;transition:border 0.15s;outline:none;background:#FDFAF6;color:#2C2C2C}
input:focus{border-color:#1C4A35;background:#fff}
.btn{display:inline-block;padding:10px 20px;border-radius:8px;border:1px solid #C8C0B4;background:#fff;color:#4A4035;font-size:13px;cursor:pointer;transition:all 0.15s;font-weight:500;letter-spacing:0.02em}
.btn:hover{background:#F5F0E8}
.btn.primary{background:#1C4A35;border-color:#1C4A35;color:#fff}
.btn.primary:hover{background:#153829}
.btn.danger{background:#8B3A3A;border-color:#8B3A3A;color:#fff}
.btn.danger:hover{background:#6E2D2D}
.btn.sm{padding:6px 13px;font-size:11px;letter-spacing:0.02em}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;line-height:1.6}
.alert.success{background:#EBF2ED;color:#1C4A35;border:1px solid #A8C8B4}
.alert.error{background:#F5EDEC;color:#8B3A3A;border:1px solid #D4A8A8}
.done-wrap{text-align:center;padding:2.5rem 1rem}
.done-icon{width:60px;height:60px;border-radius:50%;background:#EBF2ED;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:26px;color:#1C4A35}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:1.5px solid #E8E0D4;color:#9A8E82;font-weight:500;font-size:12px;letter-spacing:0.03em}
td{padding:10px 12px;border-bottom:1px solid #F0EAE2;vertical-align:middle}
tr:last-child td{border-bottom:none}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#fff;border-radius:12px;padding:1.1rem;text-align:center;border:1px solid #E8E0D4}
.stat-num{font-size:28px;font-weight:700;color:#1C4A35}
.stat-label{font-size:11px;color:#9A8E82;margin-top:4px;letter-spacing:0.03em}
.overlay{position:fixed;inset:0;background:rgba(44,36,30,0.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:14px;padding:1.75rem;width:100%;max-width:360px;border:1px solid #E8E0D4}
.modal-title{font-size:15px;font-weight:600;color:#1C4A35;margin-bottom:0.75rem}
.modal-desc{font-size:13px;color:#7A6E64;line-height:1.6;margin-bottom:1.5rem}
.hidden{display:none}
.booking-slot-info{font-size:14px;color:#1C4A35;font-weight:600;margin-bottom:1.25rem;padding:12px 16px;background:#EBF2ED;border-radius:8px;border:1px solid #A8C8B4}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-inline{width:26px;height:26px;border:2px solid #E0D8CE;border-top-color:#1C4A35;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 8px}
</style>
</head>

    </div>
    <button class="btn" onclick="showPage('home')" style="margin-top:6px">← 돌아가기</button>
  </div>

  <div id="page-admin" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div style="font-size:16px;font-weight:600;color:#1C4A35">관리자 현황</div>
      <div style="display:flex;gap:6px">
        <button class="btn sm" onclick="exportCSV()">CSV 내보내기</button>
        <button class="btn sm danger" onclick="adminLogout()">로그아웃</button>
      </div>
    </div>
    <div id="admin-stats" class="stat-grid"></div>
    <div class="card">
      <div class="tab-bar">
        <button class="tab active" onclick="switchAdminDay(0,this)">4월 24일 (목)</button>
        <button class="tab" onclick="switchAdminDay(1,this)">4월 25일 (금)</button>
      </div>
      <div id="admin-table"></div>
    </div>
    <button class="btn" onclick="showPage('home')" style="margin-top:6px">← 돌아가기</button>
  </div>
</div>

<div id="modal-cancel" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">예약 취소</div>
    <div id="modal-cancel-info" class="modal-desc"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('cancel')">닫기</button>
      <button class="btn danger" onclick="confirmCancel()">취소 확인</button>
    </div>
  </div>
</div>

<div id="modal-admin-cancel" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">예약 취소 (관리자)</div>
    <div id="modal-admin-cancel-info" class="modal-desc"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('admin-cancel')">닫기</button>
      <button class="btn danger" onclick="confirmAdminCancel()">취소 확인</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://liqireuoeyqrkgcdfwlp.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpcWlyZXVvZXlxcmtnY2Rmd2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjA3MzUsImV4cCI6MjA5MTc5NjczNX0.SFGk8r0O90n863WXiiNM1nB3j8Vk_WxnTPyZU4nWMV4';
const ADMIN_PW='admin1349';
const DAYS=['2025-04-24','2025-04-25'];
const DAY_LABELS=['4월 24일 (목)','4월 25일 (금)'];

function genSlots(day){
  const s=[];
  for(let h=10;h<17;h++){
    for(let m=0;m<60;m+=20){
      const sh=String(h).padStart(2,'0'),sm=String(m).padStart(2,'0');
      const em=String((m+20)%60).padStart(2,'0');
      const eh=m+20>=60?String(h+1).padStart(2,'0'):sh;
      s.push({key:day+'_'+sh+sm,label:sh+':'+sm+'~'+eh+':'+em,day:day});
    }
  }
  return s;
}
const ALL_SLOTS={[DAYS[0]]:genSlots(DAYS[0]),[DAYS[1]]:genSlots(DAYS[1])};
let currentDay=0,adminDay=0;
let selectedSlot=null,pendingCancelId=null,adminCancelId=null;
let takenKeys=new Set();

async function api(method,path,body){
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Accept':'application/json'};
  if(method==='POST')headers['Prefer']='return=representation';
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){let msg='오류';try{const e=await res.json();msg=e.message||e.error||JSON.stringify(e);}catch(ex){}throw new Error(msg);}
  if(res.status===204)return null;
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function fetchTaken(){
  const data=await api('GET','bookings?select=slot_key');
  takenKeys=new Set((data||[]).map(function(r){return r.slot_key;}));
}

function showPage(name){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  if(name==='home')renderSlots();
  if(name==='admin')renderAdmin();
  if(name==='lookup'){
    document.getElementById('look-name').value='';
    document.getElementById('look-phone').value='';
    document.getElementById('lookup-alert').innerHTML='';
    document.getElementById('lookup-result').innerHTML='';
  }
}

function switchDay(idx,el){
  currentDay=idx;
  document.querySelectorAll('#page-home .tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderSlots();
}

async function renderSlots(){
  const sa=document.getElementById('slot-area');
  sa.innerHTML='<div style="text-align:center;padding:2rem"><div class="spinner-inline"></div><div style="font-size:12px;color:#9A8E82">불러오는 중...</div></div>';
  document.getElementById('slot-count-text').textContent='';
  try{
    await fetchTaken();
    const day=DAYS[currentDay];
    const slots=ALL_SLOTS[day];
    const takenCount=slots.filter(function(s){return takenKeys.has(s.key);}).length;
    document.getElementById('slot-count-text').textContent='잔여 '+(slots.length-takenCount)+'/'+slots.length+' 상담 시간';
    let html='<div class="slot-grid">';
    slots.forEach(function(s){
      const t=takenKeys.has(s.key);
      if(t){
        html+='<div class="slot taken"><div class="slot-time">'+s.label+'</div><div class="slot-status">예약완료</div></div>';
      }else{
        html+='<div class="slot" data-key="'+s.key+'" data-label="'+s.label+'" data-day="'+day+'" onclick="selectSlotEl(this)"><div class="slot-time">'+s.label+'</div></div>';
      }
    });
    html+='</div>';
    sa.innerHTML=html;
  }catch(e){
    sa.innerHTML='<p style="color:#8B3A3A;font-size:13px;padding:1rem">오류: '+e.message+'</p>';
  }
}

function selectSlotEl(el){
  selectSlot(el.dataset.key, el.dataset.label, el.dataset.day);
}
function selectSlot(key,label,day){
  selectedSlot={key,label,day};
  document.getElementById('booking-slot-info').textContent=DAY_LABELS[DAYS.indexOf(day)]+'  '+label;
  document.getElementById('inp-name').value='';
  document.getElementById('inp-phone').value='';
  document.getElementById('booking-alert').innerHTML='';
  showPage('booking');
}

async function submitBooking(){
  const name=document.getElementById('inp-name').value.trim();
  const phone=document.getElementById('inp-phone').value.trim();
  if(!name||!phone){document.getElementById('booking-alert').innerHTML='<div class="alert error">이름과 연락처를 모두 입력해주세요.</div>';return;}
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='예약 중...';
  try{
    await api('POST','bookings',{slot_key:selectedSlot.key,day:selectedSlot.day,label:selectedSlot.label,name:name,phone:phone});
    document.getElementById('done-info').textContent=DAY_LABELS[DAYS.indexOf(selectedSlot.day)]+'  '+selectedSlot.label+'  ·  '+name+' 님';
    showPage('booking-done');
  }catch(e){
    if(e.message.includes('unique')||e.message.includes('duplicate')){
      document.getElementById('booking-alert').innerHTML='<div class="alert error">이미 예약된 시간입니다. 다른 시간을 선택해주세요.</div>';
    }else{
      document.getElementById('booking-alert').innerHTML='<div class="alert error">오류: '+e.message+'</div>';
    }
  }
  btn.disabled=false;btn.textContent='예약하기';
}

async function doLookup(){
  const name=document.getElementById('look-name').value.trim();
  const phone=document.getElementById('look-phone').value.trim();
  if(!name||!phone){document.getElementById('lookup-alert').innerHTML='<div class="alert error">이름과 연락처를 모두 입력해주세요.</div>';return;}
  document.getElementById('lookup-alert').innerHTML='';
  try{
    const data=await api('GET','bookings?name=eq.'+encodeURIComponent(name)+'&phone=eq.'+encodeURIComponent(phone)+'&select=*');
    if(!data||data.length===0){
      document.getElementById('lookup-result').innerHTML='<div class="alert error" style="margin-top:8px">일치하는 예약 내역이 없습니다.</div>';
    }else{
      let html='<div class="card" style="margin-top:8px"><div class="section-title">예약 내역</div>';
      data.forEach(function(b){
        const dl=DAY_LABELS[DAYS.indexOf(b.day)]||b.day;
        html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F0EAE2"><div><div style="font-size:14px;font-weight:600;color:#2C2C2C">'+dl+' '+b.label+'</div><div style="font-size:12px;color:#9A8E82;margin-top:3px">'+b.name+' · '+b.phone+'</div></div><button class="btn sm danger" onclick="openCancelModal(''+b.id+'',''+dl+' '+b.label+'')">취소</button></div>';
      });
      html+='</div>';
      document.getElementById('lookup-result').innerHTML=html;
    }
  }catch(e){
    document.getElementById('lookup-alert').innerHTML='<div class="alert error">오류: '+e.message+'</div>';
  }
}

function openCancelModal(id,info){
  pendingCancelId=id;
  document.getElementById('modal-cancel-info').textContent='"'+info+'" 예약을 취소하시겠습니까?';
  document.getElementById('modal-cancel').classList.remove('hidden');
}
function closeModal(type){document.getElementById('modal-'+type).classList.add('hidden');}
async function confirmCancel(){
  try{
    await api('DELETE','bookings?id=eq.'+pendingCancelId);
    closeModal('cancel');
    document.getElementById('lookup-result').innerHTML='';
    document.getElementById('look-name').value='';
    document.getElementById('look-phone').value='';
    document.getElementById('lookup-alert').innerHTML='<div class="alert success">예약이 취소되었습니다.</div>';
  }catch(e){alert('오류: '+e.message);}
}

function doAdminLogin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw===ADMIN_PW){document.getElementById('admin-pw').value='';showPage('admin');}
  else{document.getElementById('admin-login-alert').innerHTML='<div class="alert error">비밀번호가 올바르지 않습니다.</div>';}
}
function adminLogout(){showPage('home');}
function switchAdminDay(idx,el){
  adminDay=idx;
  document.querySelectorAll('#page-admin .tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderAdminTable();
}

let allBookings=[];
async function renderAdmin(){
  try{
    allBookings=await api('GET','bookings?select=*&order=day.asc,slot_key.asc');
    allBookings=allBookings||[];
    const total=ALL_SLOTS[DAYS[0]].length+ALL_SLOTS[DAYS[1]].length;
    const taken=allBookings.length;
    document.getElementById('admin-stats').innerHTML=
      '<div class="stat-card"><div class="stat-num">'+taken+'</div><div class="stat-label">전체 예약</div></div>'+
      '<div class="stat-card"><div class="stat-num">'+(total-taken)+'</div><div class="stat-label">잔여 시간</div></div>'+
      '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">전체 시간</div></div>';
    renderAdminTable();
  }catch(e){alert('데이터 로드 오류: '+e.message);}
}

function renderAdminTable(){
  const day=DAYS[adminDay];
  const slots=ALL_SLOTS[day];
  const map={};
  allBookings.forEach(function(b){if(b.day===day)map[b.slot_key]=b;});
  let html='<table><thead><tr><th>시간</th><th>이름</th><th>연락처</th><th>상태</th><th></th></tr></thead><tbody>';
  slots.forEach(function(s){
    const b=map[s.key];
    if(b){
      html+='<tr><td>'+s.label+'</td><td>'+b.name+'</td><td>'+b.phone+'</td><td><span class="badge taken">예약완료</span></td><td><button class="btn sm danger" onclick="openAdminCancelModal(''+b.id+'',''+s.label+'',''+b.name+'')">취소</button></td></tr>';
    }else{
      html+='<tr><td>'+s.label+'</td><td style="color:#C5BDB4">-</td><td style="color:#C5BDB4">-</td><td><span class="badge avail">가능</span></td><td></td></tr>';
    }
  });
  html+='</tbody></table>';
  document.getElementById('admin-table').innerHTML=html;
}

function openAdminCancelModal(id,label,name){
  adminCancelId=id;
  document.getElementById('modal-admin-cancel-info').textContent='"'+label+' · '+name+'" 예약을 취소하시겠습니까?';
  document.getElementById('modal-admin-cancel').classList.remove('hidden');
}
async function confirmAdminCancel(){
  try{
    await api('DELETE','bookings?id=eq.'+adminCancelId);
    closeModal('admin-cancel');
    await renderAdmin();
  }catch(e){alert('오류: '+e.message);}
}

function exportCSV(){
  let csv='﻿날짜,시간,이름,연락처
';
  DAYS.forEach(function(day,di){
    ALL_SLOTS[day].forEach(function(s){
      const b=allBookings.find(function(x){return x.slot_key===s.key;});
      if(b)csv+=DAY_LABELS[di]+','+s.label+','+b.name+','+b.phone+'
';
    });
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='예약현황.csv';a.click();
}

renderSlots();
</script>
</body>
</html>
